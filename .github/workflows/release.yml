name: CI/CD

on:
  push:
    branches:
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Get version info
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version
        id: current
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if version changed
        id: check
        run: |
          git fetch origin main
          MAIN_VERSION=$(git show origin/main:Cargo.toml | grep -m1 '^version' | sed 's/.*"\(.*\)".*/\1/' || echo "0.0.0")
          CURRENT_VERSION="${{ steps.current.outputs.version }}"

          echo "Main version: $MAIN_VERSION"
          echo "Current version: $CURRENT_VERSION"

          if [ "$MAIN_VERSION" != "$CURRENT_VERSION" ]; then
            echo "Version changed!"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

  # Windows build (yo-auto) - always run
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build yo-auto (with audio support)
        run: cargo build --release --bin yo --features audio

      - name: Rename to yo-auto.exe
        run: mv target/release/yo.exe target/release/yo-auto.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yo-auto-windows
          path: target/release/yo-auto.exe
          if-no-files-found: error

  # Linux musl build (yo-git + yo-s5 + yo-ob) - always run
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Linux binaries
        run: |
          cargo build --release --target x86_64-unknown-linux-musl --no-default-features --bin yo-git
          cargo build --release --target x86_64-unknown-linux-musl --no-default-features --bin yo-s5
          cargo build --release --target x86_64-unknown-linux-musl --no-default-features --bin yo-file
          cargo build --release --target x86_64-unknown-linux-musl --no-default-features --bin yo-ob

      - name: Upload yo-git
        uses: actions/upload-artifact@v4
        with:
          name: yo-git-linux
          path: target/x86_64-unknown-linux-musl/release/yo-git
          if-no-files-found: error

      - name: Upload yo-s5
        uses: actions/upload-artifact@v4
        with:
          name: yo-s5-linux
          path: target/x86_64-unknown-linux-musl/release/yo-s5
          if-no-files-found: error

      - name: Upload yo-file
        uses: actions/upload-artifact@v4
        with:
          name: yo-file-linux
          path: target/x86_64-unknown-linux-musl/release/yo-file
          if-no-files-found: error

      - name: Upload yo-ob
        uses: actions/upload-artifact@v4
        with:
          name: yo-ob-linux
          path: target/x86_64-unknown-linux-musl/release/yo-ob
          if-no-files-found: error

  # Dev release (every push to dev) - prerelease
  release-dev:
    needs: [check-version, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Delete existing dev release
        run: gh release delete "v${{ needs.check-version.outputs.version }}-dev" --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete existing dev tag
        run: git push origin :refs/tags/v${{ needs.check-version.outputs.version }}-dev || true

      - name: Create Dev Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}-dev
          name: v${{ needs.check-version.outputs.version }}-dev
          body: |
            ## Development Build

            ⚠️ This is a **development** release from the `dev` branch.

            - Branch: `dev`
            - Commit: ${{ github.sha }}
            - Built at: ${{ github.event.head_commit.timestamp }}

            For stable releases, see the latest non-dev version.

            ---

            ## Quick Download

            **Linux (download as `yo`):**
            ```bash
            # yo-git (GitHub SSH key management)
            curl -fsSL -o yo https://github.com/${{ github.repository }}/releases/download/v${{ needs.check-version.outputs.version }}-dev/yo-git && chmod +x yo

            # yo-s5 (SOCKS5 proxy)
            curl -fsSL -o yo https://github.com/${{ github.repository }}/releases/download/v${{ needs.check-version.outputs.version }}-dev/yo-s5 && chmod +x yo

            # yo-file (File utilities)
            curl -fsSL -o yo https://github.com/${{ github.repository }}/releases/download/v${{ needs.check-version.outputs.version }}-dev/yo-file && chmod +x yo

            # yo-ob (OceanBase tool)
            curl -fsSL -o yo-ob https://github.com/${{ github.repository }}/releases/download/v${{ needs.check-version.outputs.version }}-dev/yo-ob && chmod +x yo-ob
            ```

            **Windows (download as `yo.exe`):**
            ```bash
            # yo-auto (Task scheduler with TTS)
            curl -fsSL -o yo.exe https://github.com/${{ github.repository }}/releases/download/v${{ needs.check-version.outputs.version }}-dev/yo-auto.exe
            ```
          prerelease: true
          files: |
            artifacts/yo-auto-windows/yo-auto.exe
            artifacts/yo-git-linux/yo-git
            artifacts/yo-s5-linux/yo-s5
            artifacts/yo-file-linux/yo-file
            artifacts/yo-ob-linux/yo-ob

      # Publish yo-git to sf-express repo (public, no auth required to download)
      - name: Publish yo-git to sf-express (dev)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.SF_EXPRESS_TOKEN }}
        run: |
          VERSION="v${{ needs.check-version.outputs.version }}-dev"

          # Delete existing release if exists
          gh release delete "$VERSION" --repo terminal800/sf-express --yes || true

          # Create new release with yo-git, yo-s5, yo-ob
          gh release create "$VERSION" \
            --repo terminal800/sf-express \
            --title "$VERSION" \
            --notes "## Quick Download
          \`\`\`bash
          curl -fsSL -o yo https://github.com/terminal800/sf-express/releases/download/$VERSION/yo-git && chmod +x yo
          curl -fsSL -o yo https://github.com/terminal800/sf-express/releases/download/$VERSION/yo-s5 && chmod +x yo
          curl -fsSL -o yo-ob https://github.com/terminal800/sf-express/releases/download/$VERSION/yo-ob && chmod +x yo-ob
          \`\`\`" \
            --prerelease \
            artifacts/yo-git-linux/yo-git \
            artifacts/yo-s5-linux/yo-s5 \
            artifacts/yo-ob-linux/yo-ob

  # Stable release (only when version changed) - merge to main
  release-stable:
    needs: [check-version, build-windows, build-linux]
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge dev to main
        run: |
          git fetch origin main
          git checkout main
          git merge origin/dev --no-edit
          git push origin main

      - name: Create and push tag
        run: |
          VERSION="v${{ needs.check-version.outputs.version }}"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create Stable Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          body: |
            ## Quick Download

            **Linux (download as `yo`):**
            ```bash
            # yo-git (GitHub SSH key management)
            curl -fsSL -o yo https://github.com/${{ github.repository }}/releases/download/v${{ needs.check-version.outputs.version }}/yo-git && chmod +x yo

            # yo-s5 (SOCKS5 proxy)
            curl -fsSL -o yo https://github.com/${{ github.repository }}/releases/download/v${{ needs.check-version.outputs.version }}/yo-s5 && chmod +x yo

            # yo-file (File utilities)
            curl -fsSL -o yo https://github.com/${{ github.repository }}/releases/download/v${{ needs.check-version.outputs.version }}/yo-file && chmod +x yo

            # yo-ob (OceanBase tool)
            curl -fsSL -o yo-ob https://github.com/${{ github.repository }}/releases/download/v${{ needs.check-version.outputs.version }}/yo-ob && chmod +x yo-ob
            ```

            **Windows (download as `yo.exe`):**
            ```bash
            # yo-auto (Task scheduler with TTS)
            curl -fsSL -o yo.exe https://github.com/${{ github.repository }}/releases/download/v${{ needs.check-version.outputs.version }}/yo-auto.exe
            ```

            ---

          generate_release_notes: true
          prerelease: false
          files: |
            artifacts/yo-auto-windows/yo-auto.exe
            artifacts/yo-git-linux/yo-git
            artifacts/yo-s5-linux/yo-s5
            artifacts/yo-file-linux/yo-file
            artifacts/yo-ob-linux/yo-ob

      # Publish yo-git to sf-express repo (public, no auth required to download)
      - name: Publish yo-git to sf-express (stable)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.SF_EXPRESS_TOKEN }}
        run: |
          VERSION="v${{ needs.check-version.outputs.version }}"

          # Delete existing release if exists
          gh release delete "$VERSION" --repo terminal800/sf-express --yes || true

          # Create new release with yo-git, yo-s5, yo-ob
          gh release create "$VERSION" \
            --repo terminal800/sf-express \
            --title "$VERSION" \
            --notes "## Quick Download
          \`\`\`bash
          curl -fsSL -o yo https://github.com/terminal800/sf-express/releases/download/$VERSION/yo-git && chmod +x yo
          curl -fsSL -o yo https://github.com/terminal800/sf-express/releases/download/$VERSION/yo-s5 && chmod +x yo
          curl -fsSL -o yo-ob https://github.com/terminal800/sf-express/releases/download/$VERSION/yo-ob && chmod +x yo-ob
          \`\`\`" \
            artifacts/yo-git-linux/yo-git \
            artifacts/yo-s5-linux/yo-s5 \
            artifacts/yo-ob-linux/yo-ob
