name: CI/CD

on:
  push:
    branches:
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Check if version changed (for release decision)
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version
        id: current
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if version changed
        id: check
        run: |
          git fetch origin main
          MAIN_VERSION=$(git show origin/main:Cargo.toml | grep -m1 '^version' | sed 's/.*"\(.*\)".*/\1/' || echo "0.0.0")
          CURRENT_VERSION="${{ steps.current.outputs.version }}"

          echo "Main version: $MAIN_VERSION"
          echo "Current version: $CURRENT_VERSION"

          if [ "$MAIN_VERSION" != "$CURRENT_VERSION" ]; then
            echo "Version changed!"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

  # Windows build (yo-auto) - always run
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build yo-auto (with audio support)
        run: cargo build --release --bin yo-auto --features audio

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yo-auto-windows
          path: target/release/yo-auto.exe
          if-no-files-found: error

  # Linux musl build (yo-git + yo-s5 + yo-ob) - always run
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Linux binaries
        run: |
          cargo build --release --target x86_64-unknown-linux-musl --bin yo-git
          cargo build --release --target x86_64-unknown-linux-musl --bin yo-s5
          cargo build --release --target x86_64-unknown-linux-musl --bin yo-file
          cargo build --release --target x86_64-unknown-linux-musl --bin yo-ob

      - name: Upload yo-git
        uses: actions/upload-artifact@v4
        with:
          name: yo-git-linux
          path: target/x86_64-unknown-linux-musl/release/yo-git
          if-no-files-found: error

      - name: Upload yo-s5
        uses: actions/upload-artifact@v4
        with:
          name: yo-s5-linux
          path: target/x86_64-unknown-linux-musl/release/yo-s5
          if-no-files-found: error

      - name: Upload yo-file
        uses: actions/upload-artifact@v4
        with:
          name: yo-file-linux
          path: target/x86_64-unknown-linux-musl/release/yo-file
          if-no-files-found: error

      - name: Upload yo-ob
        uses: actions/upload-artifact@v4
        with:
          name: yo-ob-linux
          path: target/x86_64-unknown-linux-musl/release/yo-ob
          if-no-files-found: error

  # Merge to main, create tag, and release (only when version changed)
  release:
    needs: [check-version, build-windows, build-linux]
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge dev to main
        run: |
          git fetch origin main
          git checkout main
          git merge origin/dev --no-edit
          git push origin main

      - name: Create and push tag
        run: |
          VERSION="v${{ needs.check-version.outputs.version }}"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/yo-auto-windows/yo-auto.exe
            artifacts/yo-git-linux/yo-git
            artifacts/yo-s5-linux/yo-s5
            artifacts/yo-file-linux/yo-file
            artifacts/yo-ob-linux/yo-ob
